<!--메인 페이지-->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GX 프로그램</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">GX 프로그램</a>
        <div class="d-flex gap-2">
            <a href="/login" class="btn btn-outline-light btn-sm">로그인</a>
            <a href="/signup" class="btn btn-light btn-sm">회원가입</a>
        </div>
    </div>
</nav>

<div class="container mt-5 text-center">
    <h1 class="fw-bold mb-3">이화여자대학교 GX 프로그램</h1>
    <p class="text-muted mb-5">센터, 시간대, 요일 등 다양한 조건으로 강좌를 검색하세요.</p>

    <div class="row justify-content-center g-4">
        <div class="col-md-3">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center p-4">
                    <div class="fs-1 mb-3">🔍</div>
                    <h5 class="card-title">강좌 검색</h5>
                    <p class="card-text text-muted small">원하는 조건으로 강좌를 찾아보세요</p>
                    <a href="/courses" class="btn btn-primary w-100">검색하기</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center p-4">
                    <div class="fs-1 mb-3">👤</div>
                    <h5 class="card-title">마이페이지</h5>
                    <p class="card-text text-muted small">내 예약 및 결제 내역을 확인하세요</p>
                    <a href="/mypage" class="btn btn-primary w-100">내 정보</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center p-4">
                    <div class="fs-1 mb-3">✏️</div>
                    <h5 class="card-title">회원가입</h5>
                    <p class="card-text text-muted small">회원이 되어 강좌를 신청하세요</p>
                    <a href="/signup" class="btn btn-primary w-100">가입하기</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
