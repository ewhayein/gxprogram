<!--마이페이지-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>마이페이지 - GX 프로그램</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">GX 프로그램</a>
    <div class="d-flex gap-2">
      <a href="/courses" class="btn btn-outline-light btn-sm">강좌 검색</a>
      <a href="/login" class="btn btn-light btn-sm">로그인</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h4 class="fw-bold mb-4">마이페이지</h4>
  <div id="alertBox"></div>

  <!-- 회원 정보 -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-white fw-bold">👤 회원 정보</div>
    <div class="card-body" id="memberInfo">
      <p class="text-muted">로그인 후 이용하세요.</p>
    </div>
  </div>

  <!-- 예약 내역 -->
  <div class="card shadow-sm">
    <div class="card-header bg-white fw-bold">예약/결제 내역</div>
    <div class="card-body" id="applyList">
      <p class="text-muted">로그인 후 이용하세요.</p>
    </div>
  </div>
</div>

<script>
  window.onload = function() {
      const memberId = localStorage.getItem('memberId');
      if (!memberId) {
          document.getElementById('alertBox').innerHTML =
              '<div class="alert alert-warning">로그인이 필요합니다. <a href="/login">로그인하기</a></div>';
          return;
      }
      loadMyPage(memberId);
  };

  async function loadMyPage(memberId) {
      try {
          const res = await fetch(`/api/members/${memberId}/mypage`);
          const data = await res.json();

          document.getElementById('memberInfo').innerHTML = `
              <div class="row">
                  <div class="col-md-3"><strong>이름</strong><p>${data.name}</p></div>
                  <div class="col-md-3"><strong>학번</strong><p>${data.studentId}</p></div>
                  <div class="col-md-3"><strong>전공</strong><p>${data.major || '-'}</p></div>
                  <div class="col-md-3"><strong>회원 유형</strong><p>${data.role}</p></div>
              </div>`;

          const histories = data.applyHistories;
          if (!histories || histories.length === 0) {
              document.getElementById('applyList').innerHTML =
                  '<p class="text-muted">예약 내역이 없습니다.</p>';
              return;
          }

          document.getElementById('applyList').innerHTML = `
              <table class="table table-hover">
                  <thead class="table-light">
                      <tr>
                          <th>프로그램</th>
                          <th>강좌 정보</th>
                          <th>상태</th>
                          <th>결제 금액</th>
                          <th>신청일</th>
                      </tr>
                  </thead>
                  <tbody>
                      ${histories.map(h => `
                      <tr>
                          <td>${h.programName}</td>
                          <td><small>${h.courseInfo}</small></td>
                          <td><span class="badge bg-success">${h.status}</span></td>
                          <td>${h.paymentAmount?.toLocaleString()}원</td>
                          <td><small>${h.createdAt}</small></td>
                      </tr>`).join('')}
                  </tbody>
              </table>`;
      } catch (e) {
          document.getElementById('alertBox').innerHTML =
              '<div class="alert alert-danger">데이터를 불러오지 못했습니다.</div>';
      }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
