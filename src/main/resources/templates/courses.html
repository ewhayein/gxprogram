<!--강좌 검색-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>강좌 검색 - GX 프로그램</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">GX 프로그램</a>
    <div class="d-flex gap-2">
      <a href="/mypage" class="btn btn-outline-light btn-sm">마이페이지</a>
      <a href="/login" class="btn btn-light btn-sm">로그인</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h4 class="fw-bold mb-4">강좌 검색</h4>

  <!-- 검색 필터 -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">센터</label>
          <select id="center" class="form-select">
            <option value="">전체</option>
            <option value="ECC_FITNESS">ECC 피트니스</option>
            <option value="FITNESS_ROOM">피트니스룸</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">종목</label>
          <select id="category" class="form-select">
            <option value="">전체</option>
            <option value="GX">GX</option>
            <option value="HEALTH">헬스</option>
            <option value="TENNIS">테니스</option>
            <option value="GOLF">골프</option>
            <option value="SQUASH">스쿼시</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">요일</label>
          <input type="text" id="dayOfWeek" class="form-control" placeholder="예: 월">
        </div>
        <div class="col-md-2">
          <label class="form-label">시작시간 (부터)</label>
          <input type="time" id="startTimeFrom" class="form-control">
        </div>
        <div class="col-md-2">
          <label class="form-label">시작시간 (까지)</label>
          <input type="time" id="startTimeTo" class="form-control">
        </div>
        <div class="col-md-3">
          <label class="form-label">최대 금액</label>
          <input type="number" id="maxPrice" class="form-control" placeholder="예: 50000">
        </div>
        <div class="col-md-3 d-flex align-items-end">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="hasAvailableSlot">
            <label class="form-check-label" for="hasAvailableSlot">잔여석 있는 강좌만</label>
          </div>
        </div>
        <div class="col-md-3 d-flex align-items-end">
          <button class="btn btn-primary w-100" onclick="searchCourses()">검색</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 검색 결과 -->
  <div id="resultBox">
    <p class="text-muted">검색 조건을 선택하고 검색 버튼을 눌러주세요.</p>
  </div>
</div>

<script>
  async function searchCourses() {
      const params = new URLSearchParams();
      const center = document.getElementById('center').value;
      const category = document.getElementById('category').value;
      const dayOfWeek = document.getElementById('dayOfWeek').value;
      const startTimeFrom = document.getElementById('startTimeFrom').value;
      const startTimeTo = document.getElementById('startTimeTo').value;
      const maxPrice = document.getElementById('maxPrice').value;
      const hasAvailableSlot = document.getElementById('hasAvailableSlot').checked;

      if (center) params.append('center', center);
      if (category) params.append('category', category);
      if (dayOfWeek) params.append('dayOfWeek', dayOfWeek);
      if (startTimeFrom) params.append('startTimeFrom', startTimeFrom);
      if (startTimeTo) params.append('startTimeTo', startTimeTo);
      if (maxPrice) params.append('maxPrice', maxPrice);
      if (hasAvailableSlot) params.append('hasAvailableSlot', 'true');

      try {
          const res = await fetch('/api/courses/search?' + params.toString());
          const courses = await res.json();
          renderCourses(courses);
      } catch (e) {
          document.getElementById('resultBox').innerHTML =
              '<div class="alert alert-danger">서버 오류가 발생했습니다.</div>';
      }
  }

  function renderCourses(courses) {
      const box = document.getElementById('resultBox');
      if (courses.length === 0) {
          box.innerHTML = '<div class="alert alert-info">검색 결과가 없습니다.</div>';
          return;
      }
      box.innerHTML = `
          <p class="text-muted mb-3">총 <strong>${courses.length}</strong>개 강좌</p>
          <div class="row g-3">
              ${courses.map(c => `
              <div class="col-md-4">
                  <div class="card shadow-sm h-100">
                      <div class="card-body">
                          <h6 class="card-title fw-bold">${c.programName}</h6>
                          <span class="badge bg-primary mb-2">${c.category}</span>
                          <span class="badge bg-secondary mb-2">${c.center}</span>
                          <p class="mb-1 small">👨‍🏫 ${c.instructorName}</p>
                          <p class="mb-1 small">📅 ${c.dayOfWeek} ${c.startTime} ~ ${c.endTime}</p>
                          <p class="mb-1 small">👥 잔여석: ${c.remainingSlots} / ${c.maxCapacity}</p>
                          <p class="mb-0 fw-bold text-primary">${c.price?.toLocaleString()}원</p>
                      </div>
                  </div>
              </div>`).join('')}
          </div>`;
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
